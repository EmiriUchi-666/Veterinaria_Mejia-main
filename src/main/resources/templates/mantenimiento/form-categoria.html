<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Nueva Categoría')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">
            
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2><i class="bi bi-folder-plus text-primary me-2"></i>Nueva Categoría</h2>
                    <p class="text-muted mb-0">Registra una clasificación maestra para organizar el catálogo de productos.</p>
                </div>
                <div>
                    <a href="/mantenimiento/categorias" class="btn btn-outline-secondary fw-600 shadow-sm">
                        <i class="bi bi-arrow-left me-1"></i>Volver a la Lista
                    </a>
                </div>
            </div>

            <div class="card card-custom mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-secondary mb-4 border-bottom pb-2">Datos de la Clasificación</h5>
                    
                    <form th:action="@{/mantenimiento/categorias/guardar}" th:object="${categoria}" method="POST" class="needs-validation" novalidate>
                        
                        <div class="row g-4">
                            
                            <div class="col-md-8">
                                <label class="form-label fw-600 text-dark">Nombre de la Categoría:</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-tags text-secondary"></i></span>
                                    <input type="text" th:field="*{nombre}" class="form-control" 
                                           placeholder="Ej: Fármacos, Accesorios, Alimentos..." required />
                                    <div class="invalid-feedback">El nombre de la categoría es obligatorio.</div>
                                </div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>
                            
                            <div class="col-12 text-end mt-4">
                                <hr class="mt-0 mb-4 border-light">
                                <button type="submit" class="btn btn-primary fw-600 px-4 py-2 shadow-sm">
                                    <i class="bi bi-save me-2"></i>Registrar Categoría
                                </button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
