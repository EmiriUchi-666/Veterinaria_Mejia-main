<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Gestión de Categorías')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">
            
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
                <div>
                    <h2><i class="bi bi-tags text-primary me-2"></i>Clasificaciones Maestras</h2>
                    <p class="text-muted mb-0">Administra las categorías base utilizadas para ordenar el inventario de productos.</p>
                </div>
                <div>
                    <a href="/mantenimiento/categorias/nuevo" class="btn btn-primary fw-600 shadow-sm">
                        <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
                    </a>
                </div>
            </div>

            <div class="card card-custom">
                <div class="card-body p-0">
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light" style="border-bottom: 2px solid #e2e8f0;">
                                <tr>
                                    <th class="ps-4 py-3 text-secondary fw-600" style="width: 100px;">ID</th>
                                    <th class="py-3 text-secondary fw-600">Nombre de Categoría</th>
                                    <th class="py-3 text-secondary fw-600 text-center">Productos Asociados</th>
                                    <th class="py-3 text-secondary fw-600 text-center pe-4" style="width: 150px;">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${categorias == null or #lists.isEmpty(categorias)}">
                                    <td colspan="4" class="text-center py-5 text-muted">
                                        <i class="bi bi-folder-x fs-1 d-block mb-2 text-black-50"></i>
                                        No hay categorías registradas en el sistema.
                                    </td>
                                </tr>

                                <tr th:each="c : ${categorias}">
                                    
                                    <td class="ps-4 fw-bold text-muted">
                                        #<span th:text="${c.id}">1</span>
                                    </td>
                                    
                                    <td class="fw-600 text-dark">
                                        <i class="bi bi-folder2 me-2 text-primary opacity-75"></i>
                                        <span th:text="${c.nombre}">Nombre de Categoría</span>
                                    </td>

                                    <td class="text-center">
                                        <span th:text="${c.cantidadProductos} + ' asignados'" 
                                              th:class="${c.cantidadProductos > 0} ? 'badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25' : 'badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25'">
                                            0 asignados
                                        </span>
                                    </td>
                                    
                                    <td class="text-center pe-4">
                                        <a th:if="${c.cantidadProductos == 0}" 
                                           th:href="@{/mantenimiento/categorias/eliminar/{id}(id=${c.id})}" 
                                           class="btn btn-sm btn-outline-danger shadow-sm"
                                           title="Eliminar Categoría"
                                           onclick="return confirm('¿Está seguro de que desea eliminar esta categoría permanentemente?');">
                                            <i class="bi bi-trash3 me-1"></i> Borrar
                                        </a>

                                        <button th:if="${c.cantidadProductos > 0}" 
                                                class="btn btn-sm btn-light text-muted border shadow-sm" 
                                                disabled title="No se puede borrar porque tiene productos asociados">
                                            <i class="bi bi-shield-lock me-1"></i> Restringido
                                        </button>
                                    </td>
                                    
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
