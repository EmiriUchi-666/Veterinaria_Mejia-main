<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Clientes Inactivos | VetMejía</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body{background:#f0f9ff;font-family:'Segoe UI',sans-serif;}
    .main-content{margin-left:260px;padding:2rem;}
    .list-card{border:none;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);}
    .table th{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;}
  </style>
</head>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/crm/dashboard" class="btn btn-outline-secondary rounded-pill btn-sm"><i class="bi bi-arrow-left"></i> CRM</a>
    <div>
      <h2 class="fw-bold mb-0"><i class="bi bi-person-x me-2 text-danger"></i>Clientes Inactivos</h2>
      <p class="text-muted mb-0">Clientes sin visitar en los últimos <strong th:text="${diasFiltro}"></strong> días</p>
    </div>
  </div>

  <!-- Filtro de días -->
  <div class="card list-card p-3 mb-4 d-flex flex-row align-items-center gap-3">
    <span class="text-muted fw-semibold">Filtrar por días sin visitar:</span>
    <a th:href="@{/crm/clientes/inactivos(dias=30)}"  th:classappend="${diasFiltro == 30  ? 'btn-primary' : 'btn-outline-secondary'}" class="btn btn-sm rounded-pill">30 días</a>
    <a th:href="@{/crm/clientes/inactivos(dias=60)}"  th:classappend="${diasFiltro == 60  ? 'btn-primary' : 'btn-outline-secondary'}" class="btn btn-sm rounded-pill">60 días</a>
    <a th:href="@{/crm/clientes/inactivos(dias=90)}"  th:classappend="${diasFiltro == 90  ? 'btn-primary' : 'btn-outline-secondary'}" class="btn btn-sm rounded-pill">90 días</a>
    <a th:href="@{/crm/clientes/inactivos(dias=180)}" th:classappend="${diasFiltro == 180 ? 'btn-primary' : 'btn-outline-secondary'}" class="btn btn-sm rounded-pill">6 meses</a>
  </div>

  <div class="card list-card">
    <div class="card-header bg-white border-0 pt-4 px-4">
      <h6 class="fw-bold mb-0">
        <span th:text="${#lists.size(clientes)}"></span> clientes encontrados
      </h6>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Cliente</th><th>DNI</th>
            <th class="text-center">Total visitas</th>
            <th class="text-end">Gasto total</th>
            <th class="text-end">Gasto promedio</th>
            <th class="text-center">Última visita</th>
            <th class="text-center">Días inactivo</th>
            <th class="text-center">Segmento</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(clientes)}">
            <td colspan="8" class="text-center text-muted py-5">
              <i class="bi bi-check-circle text-success" style="font-size:2rem;"></i>
              <p class="mt-2 mb-0">No hay clientes inactivos en este período.</p>
            </td>
          </tr>
          <tr th:each="cm : ${clientes}">
            <td><span class="fw-semibold" th:text="${cm.cliente?.nombre}"></span></td>
            <td class="text-muted" th:text="${cm.cliente?.dni}"></td>
            <td class="text-center" th:text="${cm.totalVisitas}"></td>
            <td class="text-end fw-semibold" th:text="'S/ ' + ${#numbers.formatDecimal(cm.gastoTotal,1,2)}"></td>
            <td class="text-end text-muted" th:text="'S/ ' + ${#numbers.formatDecimal(cm.gastoPromedio,1,2)}"></td>
            <td class="text-center text-muted">
              <span th:if="${cm.ultimaVisita != null}" th:text="${#temporals.format(cm.ultimaVisita,'dd/MM/yyyy')}"></span>
              <span th:if="${cm.ultimaVisita == null}" class="text-muted fst-italic">Sin visitas</span>
            </td>
            <td class="text-center">
              <span class="badge rounded-pill"
                    th:classappend="${cm.diasSinVisita > 180 ? 'bg-danger' : (cm.diasSinVisita > 90 ? 'bg-warning text-dark' : 'bg-secondary')}"
                    th:text="${cm.diasSinVisita} + ' días'"></span>
            </td>
            <td class="text-center">
              <span class="badge bg-secondary rounded-pill" th:text="${cm.segmento?.nombre ?: '—'}"></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
