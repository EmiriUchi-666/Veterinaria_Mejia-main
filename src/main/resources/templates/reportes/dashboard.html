<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6" lang="es">
<head th:replace="~{fragments/head :: head('Página Principal')}"></head>
<style>
  .dash-card{border:none;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,.07);transition:transform .2s;}
  .dash-card:hover{transform:translateY(-4px);}
  .kpi-icon{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;}
  .acceso-btn{border:none;border-radius:18px;padding:1.6rem 1rem;transition:all .25s;color:#fff;display:flex;flex-direction:column;align-items:center;gap:.6rem;text-decoration:none;font-weight:600;}
  .acceso-btn:hover{transform:translateY(-5px);filter:brightness(1.08);color:#fff;}
  .acceso-btn i{font-size:2.2rem;}
  .caja-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:50px;font-size:.8rem;font-weight:700;}
  .section-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:1rem;}
</style>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content p-4">

  <!-- Encabezado ───────────────────────────────────────── -->
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div>
      <h2 class="fw-bold mb-0">Página Principal</h2>
      <p class="text-muted mb-0" th:text="${fechaHoy}">Hoy</p>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span th:if="${hayCaja}" class="caja-badge" style="background:#dcfce7;color:#166534;">
        <i class="bi bi-circle-fill" style="font-size:.5rem;"></i> Caja abierta — S/ <span th:text="${#numbers.formatDecimal(saldoCaja,1,2)}"></span>
      </span>
      <span th:unless="${hayCaja}" class="caja-badge" style="background:#fee2e2;color:#991b1b;">
        <i class="bi bi-circle-fill" style="font-size:.5rem;"></i> Caja cerrada
      </span>
      <a href="/caja/estado" class="btn btn-sm btn-outline-secondary rounded-pill">Gestionar caja</a>
    </div>
  </div>

  <!-- Alertas ──────────────────────────────────────────── -->
  <div th:if="${successMsg}" class="alert alert-success alert-dismissible rounded-3 mb-3">
    <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- KPIs ─────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-xl-3">
      <div class="card dash-card p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1" style="font-size:.8rem;">VENTAS HOY</p>
            <h3 class="fw-bold mb-0" th:text="${cantidadVentas}">0</h3>
            <small class="text-muted">transacciones</small>
          </div>
          <div class="kpi-icon" style="background:#dbeafe;color:#1d4ed8;"><i class="bi bi-cart-check"></i></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-xl-3">
      <div class="card dash-card p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1" style="font-size:.8rem;">GANANCIA HOY</p>
            <h3 class="fw-bold mb-0 text-success" th:text="'S/ ' + ${#numbers.formatDecimal(gananciaNeta,1,2)}">S/ 0.00</h3>
            <small class="text-muted">neta del día</small>
          </div>
          <div class="kpi-icon" style="background:#dcfce7;color:#166534;"><i class="bi bi-graph-up-arrow"></i></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-xl-3">
      <div class="card dash-card p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1" style="font-size:.8rem;">PACIENTES</p>
            <h3 class="fw-bold mb-0" th:text="${totalPacientes}">0</h3>
            <small class="text-muted" th:text="${totalDuenos} + ' dueños registrados'"></small>
          </div>
          <div class="kpi-icon" style="background:#fef3c7;color:#b45309;"><i class="bi bi-heart-pulse"></i></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-xl-3">
      <div class="card dash-card p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <p class="text-muted mb-1" style="font-size:.8rem;">STOCK BAJO</p>
            <h3 class="fw-bold mb-0 text-danger" th:text="${productosStockBajo}">0</h3>
            <small class="text-danger">productos críticos</small>
          </div>
          <div class="kpi-icon" style="background:#fee2e2;color:#b91c1c;"><i class="bi bi-exclamation-diamond"></i></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accesos Rápidos ──────────────────────────────────── -->
  <!-- FASE 1: reducido a las 4-5 acciones más usadas, filtradas por rol.
       El resto de módulos vive en el sidebar — ya no se duplican aquí. -->
  <p class="section-title"><i class="bi bi-lightning-charge me-1"></i>Accesos Rápidos</p>
  <div class="row g-3 mb-4">

    <!-- Visible para Administrador y Empleado: el empleado opera el punto de venta -->
    <div class="col-6 col-md-4 col-lg-3" sec:authorize="hasAnyAuthority('ROLE_Administrador','ROLE_Empleado')">
      <a href="/ventas/nuevo" class="acceso-btn w-100" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        <i class="bi bi-cash-coin"></i><span>Nueva Venta</span>
      </a>
    </div>

    <!-- Visible para Administrador y Empleado: el empleado puede ver y registrar citas -->
    <div class="col-6 col-md-4 col-lg-3" sec:authorize="hasAnyAuthority('ROLE_Administrador','ROLE_Empleado')">
      <a href="/citas/nuevo" class="acceso-btn w-100" style="background:linear-gradient(135deg,#10b981,#34d399);">
        <i class="bi bi-calendar-plus"></i><span>Nueva Cita</span>
      </a>
    </div>

    <!-- Visible para Administrador y Empleado: directorio de pacientes (lectura para empleado) -->
    <div class="col-6 col-md-4 col-lg-3" sec:authorize="hasAnyAuthority('ROLE_Administrador','ROLE_Empleado')">
      <a href="/pacientes" class="acceso-btn w-100" style="background:linear-gradient(135deg,#0ea5e9,#38bdf8);">
        <i class="bi bi-search-heart"></i><span>Buscar Paciente</span>
      </a>
    </div>

    <!-- Solo Administrador: control de caja -->
    <div class="col-6 col-md-4 col-lg-3" sec:authorize="hasAuthority('ROLE_Administrador')">
      <a href="/caja/estado" class="acceso-btn w-100" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);">
        <i class="bi bi-cash-register"></i><span>Caja</span>
      </a>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
