<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Historial de Facturación')}"></head>
<style>
    .estado-ACEPTADO{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
    .estado-RECHAZADO{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}
    .estado-PENDIENTE{background:#fef9c3;color:#92400e;border:1px solid #fde68a;}
    .estado-ENVIADO{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;}
    .estado-ERROR{background:#fee2e2;color:#7f1d1d;border:1px solid #fecaca;}
    .badge-estado{padding:.35rem .75rem;border-radius:50px;font-size:.78rem;font-weight:700;}
    .demo-bar{background:linear-gradient(90deg,#f59e0b,#fbbf24);border-radius:12px;}
    .table-responsive { overflow-x: auto; }
    .btn-reintentar:disabled { cursor: not-allowed; }
</style>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-receipt me-2 text-primary"></i>Historial de Facturación</h2>
            <p class="text-muted mb-0">RUC Emisor: <strong th:text="${rucEmisor}"></strong></p>
        </div>
        <a href="/ventas" class="btn btn-outline-secondary rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Ir a Ventas
        </a>
    </div>

    <!-- Tabla historial -->
    <div class="card border-0 shadow-sm" style="border-radius:16px;">
        <div class="card-header bg-white border-0 pt-4 px-4">
            <h6 class="fw-bold mb-0">Últimos Comprobantes Procesados</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Venta ID</th>
                    <th>Comprobante</th>
                    <th>Cliente</th>
                    <th class="text-end">Total</th>
                    <th>Fecha Intento</th>
                    <th class="text-center">Estado</th>
                    <th>Respuesta API</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${paginaEstados.empty}">
                    <td colspan="8" class="text-center text-muted py-5">
                        <i class="bi bi-receipt" style="font-size:3rem;opacity:.3;"></i>
                        <p class="mt-2">Aún no se han procesado comprobantes.</p>
                    </td>
                </tr>
                <tr th:each="estado : ${paginaEstados.content}" th:id="'fila-estado-' + ${estado.id}">
                    <td th:text="${estado.venta.id}"></td>
                    <td>
                        <strong th:text="${estado.venta.serie + '-' + estado.venta.correlativo}"></strong>
                    </td>
                    <td th:text="${estado.venta.cliente.nombre}"></td>
                    <td class="text-end fw-bold" th:text="'S/ ' + ${#numbers.formatDecimal(estado.venta.totalVenta,1,2)}"></td>
                    <td th:text="${#temporals.format(estado.fechaIntento,'dd/MM/yy HH:mm')}"></td>
                    <td class="text-center">
                        <span class="badge-estado"
                              th:classappend="'estado-' + ${estado.estado?.name()}"
                              th:text="${estado.estado}"></span>
                    </td>
                    <td class="small text-muted" style="max-width: 250px; white-space: normal;" th:text="${estado.respuestaApi}"></td>
                    <td class="text-center">
                        <!-- Botón de Reintento -->
                        <button th:if="${estado.estado?.name() == 'ERROR' || estado.estado?.name() == 'RECHAZADO'}"
                                th:data-id="${estado.id}"
                                onclick="reintentar(this)"
                                class="btn btn-sm btn-warning rounded-pill btn-reintentar" title="Reenviar a SUNAT">
                            <i class="bi bi-arrow-repeat"></i> Reintentar
                        </button>
                        <!-- Enlace a PDF -->
                        <a th:if="${estado.urlPdf != null}" th:href="${estado.urlPdf}" target="_blank"
                           class="btn btn-sm btn-outline-danger rounded-pill" title="Ver PDF">
                            <i class="bi bi-file-pdf"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <!-- Paginación (si aplica) -->
    </div>
</div>

<script>
    async function reintentar(button) {
        const estadoId = button.getAttribute('data-id');
        const fila = document.getElementById('fila-estado-' + estadoId);
        const celdaEstado = fila.querySelector('.badge-estado');
        const celdaRespuesta = fila.querySelector('.small.text-muted');

        // Deshabilitar botón y mostrar estado de carga
        button.disabled = true;
        button.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Enviando...';
        celdaEstado.className = 'badge-estado estado-PENDIENTE';
        celdaEstado.textContent = 'PENDIENTE';
        celdaRespuesta.textContent = 'Reintentando envío a Nubefact...';

        try {
            const response = await fetch(`/api/v1/facturacion/estados/${estadoId}/reintentar`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Añadir cabecera CSRF si está habilitado en Spring Security
                }
            });

            const data = await response.json();

            if (!response.ok) {
                // Si la API devuelve un error (4xx, 5xx)
                throw new Error(data.message || 'Error en el servidor');
            }

            // Actualizar la fila con la nueva información
            actualizarFila(fila, data);

        } catch (error) {
            console.error('Error en el reintento:', error);
            celdaEstado.className = 'badge-estado estado-ERROR';
            celdaEstado.textContent = 'ERROR';
            celdaRespuesta.textContent = 'Fallo en la comunicación con el servidor: ' + error.message;
            button.disabled = false;
            button.innerHTML = '<i class="bi bi-arrow-repeat"></i> Reintentar';
        }
    }

    function actualizarFila(fila, data) {
        const celdaEstado = fila.querySelector('.badge-estado');
        const celdaRespuesta = fila.querySelector('.small.text-muted');
        const celdaAcciones = fila.querySelector('.text-center:last-child');

        // Actualizar estado y respuesta
        celdaEstado.className = `badge-estado estado-${data.estado}`;
        celdaEstado.textContent = data.estado;
        celdaRespuesta.textContent = data.respuestaApi;

        // Limpiar acciones y reconstruir
        celdaAcciones.innerHTML = '';

        if (data.estado === 'ERROR' || data.estado === 'RECHAZADO') {
            const btn = document.createElement('button');
            btn.className = 'btn btn-sm btn-warning rounded-pill btn-reintentar';
            btn.title = 'Reenviar a SUNAT';
            btn.dataset.id = data.id;
            btn.onclick = () => reintentar(btn);
            btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Reintentar';
            celdaAcciones.appendChild(btn);
        }

        if (data.urlPdf) {
            const link = document.createElement('a');
            link.href = data.urlPdf;
            link.target = '_blank';
            link.className = 'btn btn-sm btn-outline-danger rounded-pill';
            link.title = 'Ver PDF';
            link.innerHTML = '<i class="bi bi-file-pdf"></i>';
            celdaAcciones.appendChild(link);
        }
    }
</script>

<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
