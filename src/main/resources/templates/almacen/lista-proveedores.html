<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Directorio de Proveedores')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">
            
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <div>
                    <h2 class="mb-1"><i class="bi bi-truck text-primary me-2"></i>Directorio de Proveedores</h2>
                    <p class="text-muted mb-0">Gestión de empresas suministradoras de fármacos, alimentos y equipos.</p>
                </div>
                <div>
                    <a href="/almacen/proveedores/nuevo" class="btn btn-primary fw-600 shadow-sm">
                        <i class="bi bi-plus-lg me-1"></i>Nuevo Proveedor
                    </a>
                </div>
            </div>

            <div class="card card-custom">
                <div class="card-body p-0">
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light" style="border-bottom: 2px solid #e2e8f0;">
                                <tr>
                                    <th class="ps-4 py-3 text-secondary fw-600" style="width: 80px;">ID</th>
                                    <th class="py-3 text-secondary fw-600">Empresa (Razón Social)</th>
                                    <th class="py-3 text-secondary fw-600">RUC</th>
                                    <th class="py-3 text-secondary fw-600">Representante / Contacto</th>
                                    <th class="py-3 text-secondary fw-600 text-center">Teléfono</th>
                                    <th class="py-3 text-secondary fw-600 text-center pe-4">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${proveedores == null or #lists.isEmpty(proveedores)}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="bi bi-building-slash fs-1 d-block mb-2 text-black-50"></i>
                                        No hay proveedores registrados en el sistema.
                                    </td>
                                </tr>

                                <tr th:each="prov : ${proveedores}">
                                    
                                    <td class="ps-4 fw-bold text-muted">
                                        #<span th:text="${prov.id}">1</span>
                                    </td>
                                    
                                    <td class="fw-600 text-dark">
                                        <i class="bi bi-building me-2 text-primary opacity-75"></i>
                                        <span th:text="${prov.nombreProveedor}">Nombre Empresa</span>
                                    </td>
                                    
                                    <td class="font-monospace text-secondary">
                                        <span th:text="${prov.ruc}">12345678901</span>
                                    </td>

                                    <td>
                                        <i class="bi bi-person text-secondary me-1"></i>
                                        <span th:text="${prov.contacto}">Juan Pérez</span>
                                    </td>
                                    
                                    <td class="text-center">
                                        <span class="badge bg-light text-dark border">
                                            <i class="bi bi-telephone-fill text-muted me-1"></i>
                                            <span th:text="${prov.telefono}">999888777</span>
                                        </span>
                                    </td>
                                    
                                    <td class="text-center pe-4">
                                        <a href="#" class="btn btn-sm btn-outline-primary" title="Editar Proveedor">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
