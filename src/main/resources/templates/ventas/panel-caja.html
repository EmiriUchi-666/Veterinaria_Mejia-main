<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Punto de Venta / Caja')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">
            
            <style>
                .resultados-busqueda { 
                    max-height: 480px; 
                    overflow-y: auto; 
                    border: 1px solid #e2e8f0; 
                    border-radius: 8px; 
                    background: #fff; 
                }
                .item-resultado { 
                    padding: 14px 16px; 
                    border-bottom: 1px solid #f1f5f9; 
                    cursor: pointer; 
                    display: flex; 
                    justify-content: space-between; 
                    align-items: center;
                    transition: background-color 0.2s;
                }
                .item-resultado:hover { 
                    background-color: #f0fdf4; 
                }
                .table-carrito th {
                    text-transform: uppercase;
                    font-size: 0.75rem;
                    border-bottom: 2px solid #edf2f7;
                }
                .badge-tipo {
                    font-size: 0.7rem;
                    padding: 4px 8px;
                    border-radius: 6px;
                }
                .card-custom {
                    border-radius: 1.25rem !important;
                }
                .cantidad-input:focus {
                    box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25) !important;
                    border-color: #198754 !important;
                }
                .resultados-busqueda::-webkit-scrollbar { width: 6px; }
                .resultados-busqueda::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            </style>

            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorStock}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-x-octagon-fill me-2"></i><span th:text="${errorStock}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-display text-primary me-2"></i>Terminal de Punto de Venta</h2>
                    <p class="text-muted mb-0">Gestión de boletas, tickets y salidas de inventario en tiempo real.</p>
                </div>
                <div class="text-end">
                    <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2 shadow-sm fs-6">
                        <i class="bi bi-unlock-fill me-1"></i> Caja Abierta
                    </span>
                </div>
            </div>

            <div class="row g-4">
                
                <div class="col-lg-6">
                    <div class="card card-custom p-4 h-100 border-0 shadow-sm">
                        <div class="d-flex align-items-center mb-3">
                            <div class="p-2 rounded-3 me-3 text-primary bg-opacity-10 bg-primary">
                                <i class="bi bi-funnel-fill fs-4"></i>
                            </div>
                            <h5 class="fw-bold m-0 text-secondary">Filtros de Catálogo</h5>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6 mb-2">
                                <label class="form-label text-muted small fw-semibold">Filtrar por Especie</label>
                                <select id="filtro-especie" onchange="aplicarFiltros()" class="form-select border-light-subtle shadow-sm">
                                    <option value="">Todas las especies</option>
                                    <option th:each="e : ${especies}" th:value="${e.nombreEspecie}" th:text="${e.nombreEspecie}"></option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="form-label text-muted small fw-semibold">Filtrar por Categoría</label>
                                <select id="filtro-categoria" onchange="aplicarFiltros()" class="form-select border-light-subtle shadow-sm">
                                    <option value="">Todas las categorías</option>
                                    <option th:each="cat : ${categorias}" th:value="${cat.nombre}" th:text="${cat.nombre}"></option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="input-group mb-3 shadow-sm">
                            <span class="input-group-text bg-white border-end-0 text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="busqueda-nombre" onkeyup="aplicarFiltros()" class="form-control border-start-0 ps-0" placeholder="Buscar por nombre..." />
                        </div>
                        
                        <div class="resultados-busqueda" id="contenedor-productos">
                            
                            <div class="item-resultado" th:each="p : ${productos}" 
                                 th:if="${p.estado}"
                                     th:data-id="${p.id}" th:data-nombre="${p.nombre}" 
                                     th:data-precio="${p.precioVentaActual}" 
                                     th:data-precio-fraccion="${p.precioPorFraccion != null ? p.precioPorFraccion : 0}"
                                     th:data-stock-cerrado="${p.stockCerrado != null ? p.stockCerrado : 0}" 
                                     th:data-permite-fraccion="${p.permiteFraccionamiento != null ? p.permiteFraccionamiento : false}"
                                     th:data-categoria="${p.categoria.nombre}" 
                                     th:data-especie="${p.especie != null ? p.especie.nombreEspecie : 'General'}">
                                <div>
                                    <div class="fw-bold text-dark mb-1" th:text="${p.nombre}"></div>
                                    <div class="text-muted small">
                                        <span class="badge bg-light text-dark border badge-tipo me-1">P</span>
                                            Stock: <span th:text="${p.stockCerrado != null ? p.stockCerrado : 0}"></span> sacos
                                            <span th:if="${p.permiteFraccionamiento != null and p.permiteFraccionamiento}" class="ms-1 text-primary fw-semibold">
                                                (Abierto: <span th:text="${p.stockAbierto != null ? p.stockAbierto : 0}"></span> u/kg)
                                            </span>
                                    </div>
                                </div>
                                    <div class="text-end d-flex flex-column gap-2">
                                        <button type="button" class="btn btn-sm btn-success py-0 px-2 fw-bold" onclick="agregarAlCarrito(this.closest('.item-resultado'), 'producto_entero')">
                                            + Entero (S/. <span th:text="${#numbers.formatDecimal(p.precioVentaActual, 1, 'COMMA', 2, 'POINT')}"></span>)
                                        </button>
                                        <button type="button" class="btn btn-sm btn-primary py-0 px-2 fw-bold" th:if="${p.permiteFraccionamiento != null and p.permiteFraccionamiento}" onclick="agregarAlCarrito(this.closest('.item-resultado'), 'producto_fraccionado')">
                                            + Suelto (S/. <span th:text="${#numbers.formatDecimal(p.precioPorFraccion, 1, 'COMMA', 2, 'POINT')}"></span>)
                                        </button>
                                </div>
                            </div>
                            
                            <div class="item-resultado" th:each="s : ${servicios}" 
                                 th:data-id="${s.id}" th:data-nombre="${s.nombreServicio}" th:data-precio="${s.precioServicio}" 
                                 th:data-stock="9999" th:data-categoria="Servicio" th:data-especie="General"
                                 onclick="agregarAlCarrito(this, 'servicio')">
                                <div>
                                    <div class="fw-bold text-dark mb-1" th:text="${s.nombreServicio}"></div>
                                    <div class="text-muted small">
                                        <span class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-25 badge-tipo me-1">S</span>
                                        Servicio Clínico
                                    </div>
                                </div>
                                <div class="text-end">
                                    <span class="fw-bold text-primary">S/. <span th:text="${#numbers.formatDecimal(s.precioServicio, 1, 'COMMA', 2, 'POINT')}"></span></span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card card-custom p-4 h-100 border-0 shadow-sm border-top border-4 border-success">
                        <div class="d-flex align-items-center mb-3">
                            <div class="p-2 rounded-3 me-3 text-success bg-opacity-10 bg-success">
                                <i class="bi bi-cart-fill fs-4"></i>
                            </div>
                            <h5 class="fw-bold m-0 text-secondary">Comprobante Actual</h5>
                        </div>

                        <form th:action="@{/ventas/procesar}" th:object="${venta}" method="POST" id="form-venta" onsubmit="return validarCarritoAntesDeCobrar()">
                            <input type="hidden" th:field="*{totalVenta}" id="input-total-final" value="0.00" />
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label class="form-label text-muted small fw-semibold">DNI (Opcional)</label>
                                    <input type="text" name="dniIngresado" id="dniIngresado" oninput="buscarClientePorDNI(this.value)" class="form-control" placeholder="Nro Documento" maxlength="15"/>
                                </div>
                                <div class="col-md-8 position-relative">
                                    <label class="form-label text-muted small fw-semibold">Nombre Cliente (Opcional)</label>
                                    <input type="text" name="nombreIngresado" id="nombreIngresado" class="form-control pe-5" placeholder="Público General si está vacío"/>
                                    <!-- Spinner oculto por defecto (d-none) -->
                                    <div id="spinnerBusqueda" class="spinner-border text-primary spinner-border-sm position-absolute d-none" style="right: 22px; bottom: 10px;" role="status">
                                        <span class="visually-hidden">Buscando...</span>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label text-muted small fw-semibold">Método de Pago</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light text-muted"><i class="bi bi-wallet2"></i></span>
                                        <select th:field="*{tipoPago}" class="form-select" required>
                                            <option value="Efectivo">Efectivo</option>
                                            <option value="Yape">Yape</option>
                                            <option value="Plin">Plin</option>
                                            <option value="Tarjeta">Tarjeta</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="table-responsive" style="min-height: 250px;">
                                <table class="table table-carrito align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th style="width: 42%;" class="text-secondary">Descripción</th>
                                            <th style="width: 23%;" class="text-secondary text-center">Cant.</th>
                                            <th style="width: 15%;" class="text-secondary text-end">P. Unit</th>
                                            <th style="width: 15%;" class="text-secondary text-end">Subt.</th>
                                            <th style="width: 5%;" class="text-center"><i class="bi bi-trash3"></i></th>
                                        </tr>
                                    </thead>
                                    <tbody id="cuerpo-carrito"></tbody>
                                </table>
                            </div>
                            
                            <hr class="text-muted my-4">
                            
                            <div class="d-flex justify-content-between align-items-center mb-4 p-4 bg-success bg-opacity-10 rounded-4 border border-success border-opacity-25 shadow-sm">
                                <span class="text-success fw-bold fs-5"><i class="bi bi-cash-stack me-2"></i>TOTAL A COBRAR:</span>
                                <h1 class="fw-bolder text-success m-0 display-5">S/. <span id="label-total-visual">0.00</span></h1>
                            </div>
                            
                            <button type="submit" class="btn btn-success w-100 py-3 fs-5 fw-bold shadow-sm rounded-4">
                                <i class="bi bi-check-circle-fill me-2"></i> Procesar Transacción e Imprimir
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let indice = 0;

        // FILTRO DE BÚSQUEDA
        function aplicarFiltros() {
            const esp = document.getElementById("filtro-especie").value.toLowerCase();
            const cat = document.getElementById("filtro-categoria").value.toLowerCase();
            const nom = document.getElementById("busqueda-nombre").value.toLowerCase();
            
            document.querySelectorAll(".item-resultado").forEach(item => {
                const iEsp = item.getAttribute("data-especie").toLowerCase();
                const iCat = item.getAttribute("data-categoria").toLowerCase();
                const iNom = item.getAttribute("data-nombre").toLowerCase();
                
                const coincideEspecie = (esp === "" || iEsp.includes(esp) || iCat === "servicio");
                const coincideCategoria = (cat === "" || iCat.includes(cat));
                const coincideNombre = (nom === "" || iNom.includes(nom));

                if (coincideEspecie && coincideCategoria && coincideNombre) {
                    item.style.setProperty("display", "flex", "important");
                } else {
                    item.style.setProperty("display", "none", "important");
                }
            });
        }

        // AGREGAR AL CARRITO
        function agregarAlCarrito(el, tipo) {
            const id = el.getAttribute("data-id");
            let nombre = el.getAttribute("data-nombre");
            let precio = parseFloat(el.getAttribute("data-precio"));
            let stock = parseFloat(el.getAttribute("data-stock-cerrado") || "9999");
            const tbody = document.getElementById("cuerpo-carrito");
            
            let duplicado = false;
            let valTipo = 'SERVICIO';
            let labelTipo = '<span class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-25 me-1">S</span>';
            let stepYMin = '1';
            
            if (tipo === 'producto_entero') {
                valTipo = 'PRODUCTO_ENTERO';
                labelTipo = '<span class="badge bg-light text-dark border me-1">P</span>';
                stepYMin = '1';
                nombre += ' <small class="text-muted">(Entero)</small>';
            } else if (tipo === 'producto_fraccionado') {
                valTipo = 'PRODUCTO_FRACCIONADO';
                labelTipo = '<span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 me-1">F</span>';
                precio = parseFloat(el.getAttribute("data-precio-fraccion"));
                stock = 9999; // Stock controlado en el Backend (puede romper sacos)
                stepYMin = '0.01';
                nombre += ' <small class="text-primary">(Suelto)</small>';
            }
            
            // Verificar si ya existe en el carrito
            document.querySelectorAll("#cuerpo-carrito tr").forEach(tr => {
                const hiddenId = tr.querySelector("input[name='itemId']");
                const hiddenTipo = tr.querySelector("input[name='itemTipo']");
                
                if (hiddenId && hiddenId.value === id && hiddenTipo && hiddenTipo.value === valTipo) {
                    const inputCant = tr.querySelector("input[name='itemCantidad']");
                    const cantidadActual = parseFloat(inputCant.value);
                    
                    if (cantidadActual < stock) {
                        inputCant.value = (cantidadActual + 1).toFixed(valTipo === 'PRODUCTO_FRACCIONADO' ? 2 : 0);
                    } else if (valTipo === 'PRODUCTO_ENTERO') {
                        alert("Has alcanzado el límite de stock de este producto.");
                    }
                    duplicado = true;
                }
            });
            
            if (duplicado) { 
                recalcular(); 
                return; 
            }
            
            // Crear nueva fila con nombres simples
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>
                    <div class="fw-bold text-dark small d-flex align-items-center">
                        ${labelTipo} <span>${nombre}</span>
                    </div>
                    <input type="hidden" name="itemTipo" value="${valTipo}">
                    <input type="hidden" name="itemId" value="${id}">
                </td>
                <td>
                    <input type="number" name="itemCantidad" value="1" step="${stepYMin}" min="${stepYMin}" max="${stock}" onchange="recalcular()" class="form-control form-control-sm text-center fw-bold cantidad-input">
                </td>
                <td class="text-end text-muted small pe-3">S/. ${precio.toFixed(2)}
                    <input type="hidden" name="itemPrecio" value="${precio}">
                    <input type="hidden" name="itemSubtotal" class="input-subtotal" value="${precio}">
                </td>
                <td class="text-end fw-bold text-dark subtotal small pe-2">S/. ${precio.toFixed(2)}</td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-outline-danger border-0 p-1" onclick="this.closest('tr').remove(); recalcular()">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
            indice++;
            recalcular();
        }

        // CÁLCULO EN TIEMPO REAL
        function recalcular() {
            let total = 0;
            document.querySelectorAll("#cuerpo-carrito tr").forEach(tr => {
                const cant = parseFloat(tr.querySelector(".cantidad-input").value) || 0;
                const prec = parseFloat(tr.querySelector("input[name='itemPrecio']").value);
                const sub = cant * prec;
                
                tr.querySelector(".subtotal").innerText = "S/. " + sub.toFixed(2);
                tr.querySelector(".input-subtotal").value = sub.toFixed(2);
                total += sub;
            });
            document.getElementById("label-total-visual").innerText = total.toFixed(2);
            document.getElementById("input-total-final").value = total.toFixed(2);
        }

        // VALIDACIÓN ANTES DE ENVIAR
        function validarCarritoAntesDeCobrar() {
            const filas = document.querySelectorAll("#cuerpo-carrito tr").length;
            if (filas === 0) {
                alert("No puedes procesar una venta vacía. Agrega productos o servicios al comprobante primero.");
                return false; 
            }
            return true; 
        }

        // BÚSQUEDA AUTOMÁTICA DE CLIENTE POR DNI
        async function buscarClientePorDNI(dni) {
            const inputNombre = document.getElementById("nombreIngresado");
            const spinner = document.getElementById("spinnerBusqueda");
            
            // Empezamos a buscar a partir de 8 caracteres (DNI peruano estándar)
            if (dni.length >= 8) {
                // 1. Mostramos el spinner mientras espera
                spinner.classList.remove("d-none");
                
                try {
                    const response = await fetch(`/api/utilidades/cliente/${dni}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        inputNombre.value = data.nombre;
                        // Efecto visual opcional para indicar que lo encontró exitosamente
                        inputNombre.classList.add("border-success", "bg-success", "bg-opacity-10", "fw-bold");
                    } else {
                        // Si no lo encuentra, quitamos el efecto por si estaba de antes
                        inputNombre.classList.remove("border-success", "bg-success", "bg-opacity-10", "fw-bold");
                    }
                } catch (error) {
                    console.error("Error en la búsqueda de cliente:", error);
                } finally {
                    // 2. Ocultamos el spinner sin importar si hubo éxito o error
                    spinner.classList.add("d-none");
                }
            } else {
                inputNombre.classList.remove("border-success", "bg-success", "bg-opacity-10", "fw-bold");
                spinner.classList.add("d-none"); // Por precaución
            }
        }
    </script>
</body>
</html>
