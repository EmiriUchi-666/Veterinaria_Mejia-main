<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Nueva Receta')}"></head>
<style>
  .linea-row{background:#f8fafc;border-radius:10px;padding:1rem;margin-bottom:.75rem;position:relative;}
  .btn-rm{position:absolute;top:.5rem;right:.5rem;}
</style>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content p-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/recetas" class="btn btn-outline-secondary rounded-circle" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;"><i class="bi bi-arrow-left"></i></a>
    <div>
      <h2 class="fw-bold mb-0"><i class="bi bi-prescription2 me-2 text-success"></i>Emitir Receta Veterinaria</h2>
      <p class="text-muted mb-0">Cumple con Ley 28733 — Ejercicio de la Medicina Veterinaria</p>
    </div>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger rounded-3 mb-4"><i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span></div>

  <form action="/recetas/guardar" method="post">
    <div class="row g-4">
      <div class="col-12 col-lg-5">
        <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
          <h6 class="fw-bold mb-3 border-bottom pb-2"><i class="bi bi-person-badge text-primary me-2"></i>Datos Clínicos</h6>
          <div class="mb-3">
            <label class="form-label fw-semibold">Dueño / Tutor <span class="text-danger">*</span></label>
            <select id="selectDueno" class="form-select" onchange="filtrarMascotas()">
              <option value="">-- Seleccionar dueño --</option>
              <option th:each="d : ${duenos}" th:value="${d.id}" th:text="${d.nombre}"></option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mascota (Paciente) <span class="text-danger">*</span></label>
            <select name="pacienteId" id="selectMascota" class="form-select" required>
              <option value="">-- Primero selecciona un dueño --</option>
              <option th:each="p : ${pacientes}"
                      th:value="${p.id}"
                      th:text="${p.nombre} + ' (' + ${p.especie?.nombreEspecie} + ')'"
                      th:data-dueno-id="${p.dueno?.id}"
                      style="display:none;"></option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Veterinario <span class="text-danger">*</span></label>
            <select name="veterinarioId" class="form-select" required>
              <option value="">-- Seleccionar veterinario --</option>
              <option th:each="v : ${veterinarios}" th:value="${v.id}" th:text="${v.nombreUsuario}"></option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">N° CMP</label>
            <input type="text" name="cmpVeterinario" class="form-control" placeholder="Ej: 12345" >
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Diagnóstico <span class="text-danger">*</span></label>
            <textarea name="diagnostico" class="form-control" rows="3" required
                      placeholder="Diagnóstico clínico..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Indicaciones Generales</label>
            <textarea name="indicaciones" class="form-control" rows="2"
                      placeholder="Cuidados en casa, dieta, reposo..."></textarea>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0"><i class="bi bi-capsule text-success me-2"></i>Medicamentos Prescritos</h6>
            <button type="button" class="btn btn-sm btn-success rounded-pill" onclick="agregarLinea()">
              <i class="bi bi-plus me-1"></i>Agregar Medicamento
            </button>
          </div>
          <div id="lineasContainer">
            <div class="linea-row" id="linea_0">
              <button type="button" class="btn btn-sm btn-danger btn-rm rounded-circle" style="display:none;" onclick="quitarLinea(0)"><i class="bi bi-x"></i></button>
              <div class="row g-2 align-items-end">
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">Medicamento</label>
                  <input type="text" name="medicamento" class="form-control form-control-sm" placeholder="Nombre del medicamento" required>
                  <input type="hidden" name="productoId">
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-semibold">Cantidad</label>
                  <input type="number" name="cantidad" step="0.01" min="0.01" class="form-control form-control-sm" placeholder="1.00" value="1">
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-semibold">Frecuencia</label>
                  <input type="text" name="frecuencia" class="form-control form-control-sm" placeholder="Cada 12 horas">
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-semibold">Días</label>
                  <input type="number" name="duracionDias" min="1" class="form-control form-control-sm" placeholder="7">
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-semibold">Vía</label>
                  <select name="via" class="form-select form-select-sm">
                    <option value="Oral">Oral</option>
                    <option value="IM">IM</option><option value="IV">IV</option>
                    <option value="SC">SC</option><option value="Tópica">Tópica</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-semibold">Indicaciones</label>
                  <input type="text" name="indicLinea" class="form-control form-control-sm" placeholder="Con comida...">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="d-flex gap-3 justify-content-end mt-3">
          <a href="/recetas" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
          <button type="submit" class="btn btn-success rounded-pill px-5 fw-bold">
            <i class="bi bi-send me-2"></i>Emitir Receta Digital
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const productosOpts = /*[[${productos}]]*/ [];
  let count = 1; 

  function filtrarMascotas() {
    const duenoId = document.getElementById('selectDueno').value;
    const selectMascota = document.getElementById('selectMascota');
    selectMascota.value = ''; // Reset selection
    for (const option of selectMascota.options) {
      if (option.value === '') continue;
      option.style.display = (duenoId === '' || option.dataset.duenoId === duenoId) ? 'block' : 'none';
    }
  }

  function agregarLinea() {
    const idx = count++;
    const div = document.createElement('div');
    div.className = 'linea-row'; div.id = 'linea_' + idx;
    div.innerHTML = `
      <button type="button" class="btn btn-sm btn-danger btn-rm rounded-circle" onclick="quitarLinea(${idx})"><i class="bi bi-x"></i></button>
      <div class="row g-2 align-items-end">
        <div class="col-md-6"><label class="form-label small fw-semibold">Medicamento</label>
          <input type="text" name="medicamento" class="form-control form-control-sm" placeholder="Nombre del medicamento" required>
          <input type="hidden" name="productoId">
        </div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Cantidad</label>
          <input type="number" name="cantidad" step="0.01" min="0.01" class="form-control form-control-sm" value="1"></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Frecuencia</label>
          <input type="text" name="frecuencia" class="form-control form-control-sm" placeholder="Cada 12 horas"></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Días</label>
          <input type="number" name="duracionDias" min="1" class="form-control form-control-sm" placeholder="7"></div>
        <div class="col-md-3"><label class="form-label small fw-semibold">Vía</label>
          <select name="via" class="form-select form-select-sm">
            <option>Oral</option><option>IM</option><option>IV</option><option>SC</option><option>Tópica</option>
          </select></div>
        <div class="col-md-6"><label class="form-label small fw-semibold">Indicaciones</label>
          <input type="text" name="indicLinea" class="form-control form-control-sm" placeholder="Con comida..."></div>
      </div>`;
    document.getElementById('lineasContainer').appendChild(div);
  }
  function quitarLinea(idx) { document.getElementById('linea_' + idx)?.remove(); }
</script>
</body>
</html>
