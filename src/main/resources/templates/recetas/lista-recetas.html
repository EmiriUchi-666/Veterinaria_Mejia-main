<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Recetas Veterinarias')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0"><i class="bi bi-prescription2 me-2 text-success"></i>Recetas Veterinarias</h2>
      <p class="text-muted mb-0">Recetas digitales — Ley 28733 (Ejercicio de la Medicina Veterinaria)</p>
    </div>
    <a href="/recetas/nueva" class="btn btn-success rounded-pill px-4">
      <i class="bi bi-plus-circle me-1"></i>Nueva Receta
    </a>
  </div>

  <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show rounded-3">
    <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card border-0 shadow-sm" style="border-radius:16px;">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>N° Receta</th><th>Paciente</th><th>Veterinario</th><th>CMP</th>
            <th>Fecha</th><th>Vence</th><th class="text-center">Estado</th><th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(recetas)}">
            <td colspan="8" class="text-center text-muted py-5">
              <i class="bi bi-prescription2" style="font-size:3rem;opacity:.3;"></i>
              <p class="mt-2">No hay recetas emitidas. <a href="/recetas/nueva">Emitir la primera</a></p>
            </td>
          </tr>
          <tr th:each="r : ${recetas}">
            <td><strong th:text="${r.numeroReceta}"></strong></td>
            <td th:text="${r.paciente?.nombre}"></td>
            <td th:text="${r.veterinario?.nombreUsuario}"></td>
            <td class="text-muted" th:text="${r.cmpVeterinario}"></td>
            <td th:text="${#temporals.format(r.fechaEmision,'dd/MM/yyyy')}"></td>
            <td th:text="${#temporals.format(r.fechaVencimiento,'dd/MM/yyyy')}"></td>
            <td class="text-center">
              <span class="badge rounded-pill"
                th:classappend="${r.estado?.name() == 'EMITIDA' ? 'bg-success' :
                                 r.estado?.name() == 'DESPACHADA' ? 'bg-primary' :
                                 r.estado?.name() == 'VENCIDA' ? 'bg-warning text-dark' : 'bg-danger'}"
                th:text="${r.estado}"></span>
            </td>
            <td class="text-center">
              <a th:href="@{/recetas/ver/{id}(id=${r.id})}" class="btn btn-sm btn-outline-primary rounded-pill me-1">
                <i class="bi bi-eye"></i>
              </a>
              <a th:if="${r.estado?.name() == 'EMITIDA'}"
                 th:href="@{/recetas/anular/{id}(id=${r.id})}"
                 class="btn btn-sm btn-outline-danger rounded-pill"
                 onclick="return confirm('¿Anular esta receta?')">
                <i class="bi bi-x-circle"></i>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
