<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Cotizaciones Quirúrgicas')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-file-earmark-spreadsheet text-primary me-2"></i>Cotizaciones Quirúrgicas</h2>
                    <p class="text-muted mb-0">Gestión de presupuestos para procedimientos médicos.</p>
                </div>
                <a th:href="@{/cotizaciones/nueva}" class="btn btn-primary fw-600 shadow-sm">
                    <i class="bi bi-plus-lg me-1"></i>Nueva Cotización
                </a>
            </div>

            <div class="card card-custom">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">ID</th>
                                    <th>Fecha</th>
                                    <th>Cliente</th>
                                    <th>Procedimiento</th>
                                    <th>Total</th>
                                    <th class="text-end pe-4">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${cotizaciones.isEmpty()}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        No hay cotizaciones registradas.
                                    </td>
                                </tr>
                                <tr th:each="c : ${cotizaciones}">
                                    <td class="ps-4 fw-bold" th:text="'#' + ${c.id}"></td>
                                    <td th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy')}"></td>
                                    <td th:text="${c.cliente.nombre}"></td>
                                    <td th:text="${c.procedimiento}"></td>
                                    <td class="fw-bold text-success" th:text="'S/ ' + ${#numbers.formatDecimal(c.total, 1, 2)}"></td>
                                    <td class="text-end pe-4">
                                        <a href="#" class="btn btn-sm btn-outline-primary">Ver</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
