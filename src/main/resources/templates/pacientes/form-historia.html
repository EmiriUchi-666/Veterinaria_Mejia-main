<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Nueva Historia Clínica')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">
            
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1"><i class="bi bi-file-earmark-medical text-primary me-2"></i>Nueva Historia Clínica</h2>
                    <p class="text-muted mb-0">Registrando atención para el paciente: <strong th:text="${paciente.nombre}"></strong></p>
                </div>
                <div>
                    <a th:href="@{/pacientes/{id}/expediente(id=${paciente.id})}" class="btn btn-outline-secondary fw-600">
                        <i class="bi bi-arrow-left me-1"></i>Volver al Expediente
                    </a>
                </div>
            </div>

            <div class="card card-custom mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-secondary mb-4 border-bottom pb-2">Detalles de la Consulta</h5>
                    
                    <form th:action="@{/historias/guardar}" method="POST" class="needs-validation" novalidate>
                        
                        <input type="hidden" name="pacienteId" th:value="${paciente.id}" />

                        <div class="row g-4">
                            
                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Motivo de la Consulta:</label>
                                <input type="text" name="motivoConsulta" class="form-control" required />
                                <div class="invalid-feedback">El motivo de la consulta es obligatorio.</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-600 text-dark">Peso Actual (kg):</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-rulers text-secondary"></i></span>
                                    <input type="number" step="0.01" name="pesoActual" class="form-control" required />
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-600 text-dark">Temperatura (°C):</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-thermometer-half text-secondary"></i></span>
                                    <input type="number" step="0.1" name="temperatura" class="form-control" required />
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Síntomas Observados:</label>
                                <textarea name="sintomas" class="form-control" rows="3" required></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Diagnóstico Clínico:</label>
                                <textarea name="diagnostico" class="form-control" rows="3" required></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Pronóstico (Opcional):</label>
                                <textarea name="pronostico" class="form-control" rows="2"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Tratamiento Indicado (Opcional):</label>
                                <textarea name="tratamiento" class="form-control" rows="3"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-600 text-dark">Receta Médica (Opcional):</label>
                                <textarea name="recetaMedica" class="form-control" rows="4"></textarea>
                            </div>
                            
                            <div class="col-12 text-end mt-4">
                                <hr class="mt-0 mb-4 border-light">
                                <button type="submit" class="btn btn-primary fw-600 px-4 py-2 shadow-sm">
                                    <i class="bi bi-save me-2"></i>Guardar Historia Clínica
                                </button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Example starter JavaScript for disabling form submissions if there are invalid fields
        (function () {
          'use strict'
          var forms = document.querySelectorAll('.needs-validation')
          Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()
    </script>
</body>
</html>
