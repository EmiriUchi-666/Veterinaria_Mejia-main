<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Directorio de Pacientes')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content">
    <header th:replace="~{fragments/navbar :: topbar}"></header>
    <main class="content">

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1"><i class="bi bi-paw-fill text-primary me-2"></i>Directorio de Pacientes</h2>
                <p class="text-muted mb-0">Fichas clínicas completas de todas las mascotas registradas.</p>
            </div>
            <a th:href="@{/pacientes/nuevo}" class="btn btn-primary fw-600 shadow-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuevo Paciente
            </a>
        </div>

        <div class="card card-custom">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light" style="border-bottom: 2px solid #e2e8f0;">
                            <tr>
                                <th class="ps-4 py-3 text-secondary fw-600" style="width: 5%;">Foto</th>
                                <th class="py-3 text-secondary fw-600" style="width: 18%;">Paciente</th>
                                <th class="py-3 text-secondary fw-600" style="width: 18%;">Especie / Raza / Sangre</th>
                                <th class="py-3 text-secondary fw-600" style="width: 18%;">Tutor y Contacto</th>
                                <th class="py-3 text-secondary fw-600 text-center" style="width: 8%;">Sexo</th>
                                <th class="py-3 text-secondary fw-600" style="width: 8%;">Edad</th>
                                <th class="py-3 text-secondary fw-600" style="width: 8%;">Peso</th>
                                <th class="py-3 text-secondary fw-600" style="width: 10%;">N° Historia</th>
                                <th class="py-3 text-secondary fw-600 text-center pe-4" style="width: 12%;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${pacientes == null or #lists.isEmpty(pacientes)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="bi bi-paw fs-1 d-block mb-2"></i>
                                    Aún no hay pacientes registrados.
                                </td>
                            </tr>
                            <tr th:each="p : ${pacientes}">
                                <td class="ps-4">
                                    <div th:if="${p.rutaFoto != null}" style="width: 50px; height: 50px; border-radius: 50%; overflow: hidden; border: 2px solid #e2e8f0;">
                                        <img th:src="@{${p.rutaFoto}}" style="width: 100%; height: 100%; object-fit: cover;">
                                    </div>
                                    <div th:unless="${p.rutaFoto != null}" class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                        <i class="bi bi-paw-fill fs-4"></i>
                                    </div>
                                </td>
                                <td>
                                    <div class="fw-bold text-dark" th:text="${p.nombre}">Firulais</div>
                                    <small class="text-muted" th:if="${p.microchip != null}">
                                        <i class="bi bi-upc-scan me-1"></i>Chip: <span th:text="${p.microchip}"></span>
                                    </small>
                                </td>
                                <td>
                                    <div class="fw-500" th:text="${p.especie.nombreEspecie}">Canino</div>
                                    <small class="text-muted" th:text="${p.raza}"></small><br>
                                    <small class="text-muted" th:if="${p.sangre != null and p.sangre != 'Desconocido'}" th:text="'Sangre: ' + ${p.sangre}"></small>
                                </td>
                                <td>
                                    <!-- FASE 6: Acceso seguro a datos relacionados. Se muestra 'N/A' si el cliente es nulo. -->
                                    <div class="fw-500" th:text="${p.dueno != null ? p.dueno.nombre : 'N/A'}">Juan Pérez</div>
                                    <small class="text-muted d-flex align-items-center" th:if="${p.dueno != null and p.dueno.telefono != null}">
                                        <i class="bi bi-telephone me-1"></i>
                                        <span th:text="${p.dueno.telefono}">999888777</span>
                                    </small>
                                </td>
                                <td class="text-center">
                                    <span class="badge" 
                                          th:classappend="${p.sexo.name() == 'Macho'} ? 'bg-info bg-opacity-10 text-info border border-info border-opacity-25' : 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25'"
                                          th:text="${p.sexo.name()}">Macho</span>
                                </td>
                                <td th:text="${edades[p.id]}"></td>
                                <td>
                                    <span th:if="${p.pesoHistorico != null}" th:text="${p.pesoHistorico} + ' kg'"></span>
                                    <span th:unless="${p.pesoHistorico != null}">—</span>
                                </td>
                                <td>
                                    <span class="font-monospace small bg-light px-2 py-1 rounded border" th:text="${p.numeroHistoria}">HC-123</span>
                                </td>
                                <td class="text-center pe-4">
                                    <a th:href="@{/pacientes/{id}/expediente(id=${p.id})}" class="btn btn-sm btn-outline-primary" title="Ver Expediente">
                                        <i class="bi bi-file-earmark-medical-fill"></i>
                                    </a>
                                    <a th:href="@{/pacientes/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-secondary" title="Editar Ficha">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <a th:href="@{/pacientes/eliminar/{id}(id=${p.id})}" 
                                       class="btn btn-sm btn-outline-danger ms-1"
                                       onclick="return confirm('¿Dar de baja a este paciente?');"
                                       title="Dar de baja">
                                        <i class="bi bi-archive"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
