<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Nueva Cotización')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: menuLateral}"></div>

    <div class="main-content">
        
        <header th:replace="~{fragments/navbar :: topbar}"></header>

        <main class="content">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-1"><i class="bi bi-file-earmark-spreadsheet text-primary me-2"></i>Nueva Cotización Quirúrgica</h2>
                <a th:href="@{/cotizaciones}" class="btn btn-outline-secondary fw-600">
                    <i class="bi bi-arrow-left me-1"></i>Volver al Listado
                </a>
            </div>

            <form th:action="@{/cotizaciones/guardar}" method="POST" id="form-cotizacion">
                <div class="card card-custom mb-4">
                    <div class="card-body p-4">
                        <h5 class="card-title text-secondary mb-4 border-bottom pb-2">Datos Generales</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Cliente</label>
                                <select name="clienteId" class="form-select" required>
                                    <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Procedimiento</label>
                                <input type="text" name="procedimiento" class="form-control" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card card-custom">
                    <div class="card-body p-4">
                        <h5 class="card-title text-secondary mb-3 border-bottom pb-2">Desglose de Ítems</h5>
                        
                        <!-- Panel para agregar items -->
                        <div class="bg-light p-3 rounded border mb-4">
                            <div class="row g-2 align-items-end">
                                <div class="col-md-5">
                                    <label class="form-label small">Buscar Producto o Servicio</label>
                                    <select id="select-item" class="form-select">
                                        <optgroup label="Productos">
                                            <option th:each="p : ${productos}" th:value="'producto-' + ${p.id}" th:text="${p.nombre}" th:data-precio="${p.precioVentaActual}"></option>
                                        </optgroup>
                                        <optgroup label="Servicios">
                                            <option th:each="s : ${servicios}" th:value="'servicio-' + ${s.id}" th:text="${s.nombreServicio}" th:data-precio="${s.precioServicio}"></option>
                                        </optgroup>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label small">Cantidad</label>
                                    <input type="number" id="input-cantidad" class="form-control" value="1" step="1" min="1">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label small">Costo Unit.</label>
                                    <input type="number" id="input-costo" class="form-control" step="0.01" min="0">
                                </div>
                                <div class="col-md-3">
                                    <button type="button" class="btn btn-success w-100" onclick="agregarItem()">
                                        <i class="bi bi-plus-circle-fill me-1"></i>Añadir a la lista
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Tabla de items agregados -->
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Descripción</th>
                                        <th class="text-center">Cantidad</th>
                                        <th class="text-center">Costo Unitario</th>
                                        <th class="text-center">Subtotal</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-desglose">
                                    <!-- Los items se agregarán aquí con JS -->
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end align-items-center">
                            <span class="fw-bold fs-4 me-3">Total Cotizado:</span>
                            <h2 class="fw-bolder text-primary m-0">S/ <span id="total-cotizacion">0.00</span></h2>
                            <input type="hidden" name="total" id="input-total" value="0.00">
                        </div>

                        <div class="text-end mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold px-5">Guardar Cotización</button>
                        </div>
                    </div>
                </div>
            </form>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('select-item').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const precio = selectedOption.getAttribute('data-precio') || 0;
            document.getElementById('input-costo').value = parseFloat(precio).toFixed(2);
        });

        function agregarItem() {
            const select = document.getElementById('select-item');
            const selectedOption = select.options[select.selectedIndex];
            const valor = selectedOption.value;
            const texto = selectedOption.text;
            const tipo = valor.split('-')[0];
            const id = valor.split('-')[1];

            const cantidad = parseFloat(document.getElementById('input-cantidad').value);
            const costo = parseFloat(document.getElementById('input-costo').value);
            const subtotal = cantidad * costo;

            if (isNaN(cantidad) || isNaN(costo) || cantidad <= 0 || costo < 0) {
                alert('Por favor, ingrese una cantidad y costo válidos.');
                return;
            }

            const tbody = document.getElementById('tabla-desglose');
            const newRow = tbody.insertRow();
            newRow.innerHTML = `
                <td>
                    ${texto}
                    <input type="hidden" name="itemTipo" value="${tipo}">
                    <input type="hidden" name="itemId" value="${id}">
                    <input type="hidden" name="itemDescripcion" value="${texto}">
                </td>
                <td class="text-center">
                    ${cantidad.toFixed(2)}
                    <input type="hidden" name="itemCantidad" value="${cantidad.toFixed(2)}">
                </td>
                <td class="text-center">
                    S/ ${costo.toFixed(2)}
                    <input type="hidden" name="itemCosto" value="${costo.toFixed(2)}">
                </td>
                <td class="text-center fw-bold">
                    S/ ${subtotal.toFixed(2)}
                </td>
                <td class="text-center">
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="eliminarItem(this)">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            `;
            actualizarTotal();
        }

        function eliminarItem(btn) {
            btn.closest('tr').remove();
            actualizarTotal();
        }

        function actualizarTotal() {
            let total = 0;
            document.querySelectorAll('#tabla-desglose tr').forEach(row => {
                const cantidad = parseFloat(row.querySelector('input[name="itemCantidad"]').value);
                const costo = parseFloat(row.querySelector('input[name="itemCosto"]').value);
                total += cantidad * costo;
            });
            document.getElementById('total-cotizacion').innerText = total.toFixed(2);
            document.getElementById('input-total').value = total.toFixed(2);
        }
    </script>

</body>
</html>
