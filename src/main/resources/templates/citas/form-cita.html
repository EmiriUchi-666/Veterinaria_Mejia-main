<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Programar Cita')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content">
    <header th:replace="~{fragments/navbar :: topbar}"></header>
    <main class="content">
        <div class="d-flex align-items-center mb-4">
            <a th:href="@{/citas}" class="btn btn-outline-secondary me-3 shadow-sm rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h2 class="mb-1 fw-bold text-dark">
                    <i class="bi bi-calendar-plus text-primary me-2"></i>
                    <span th:text="${cita.id != null ? 'Editar Cita' : 'Programar Nueva Cita'}"></span>
                </h2>
                <p class="text-muted mb-0" th:text="${cita.id != null ? 'Modifica los datos de la cita programada.' : 'Agenda una atención en clínica o visita a domicilio.'}"></p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card card-custom p-4">
                    <form th:action="@{/citas/guardar}" th:object="${cita}" method="POST" id="formCita">
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-4">

                            <!-- ============ DUEÑO / TUTOR ============ -->
                            <div class="col-md-12">
                                <label class="form-label fw-bold text-dark">Dueño / Tutor <span class="text-danger">*</span></label>
                                <select id="selectDuenoCita" class="form-select" onchange="filtrarMascotasPorDueno(); autocompletarTutor();" required>
                                    <option value="">-- Seleccionar dueño --</option>
                                    <option th:each="d : ${duenos}" th:value="${d.id}" th:text="${d.nombre} + ' — DNI: ' + ${d.dni}"
                                            th:selected="${cita.paciente != null and cita.paciente.dueno != null and d.id == cita.paciente.dueno.id}"></option>
                                </select>
                            </div>

                            <!-- Datos del tutor: se rellenan solos al elegir el dueño de arriba.
                                 Son solo informativos (readonly) — no se editan aquí, se editan
                                 desde el módulo de Dueños si están mal. -->
                            <div class="col-12">
                                <div class="row g-3 p-3 bg-light rounded-3 border">
                                    <div class="col-md-3">
                                        <label class="form-label text-muted small fw-semibold mb-1">DNI / Documento</label>
                                        <input type="text" id="tutorDni" class="form-control form-control-sm" readonly placeholder="—">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label text-muted small fw-semibold mb-1">Teléfono</label>
                                        <input type="text" id="tutorTelefono" class="form-control form-control-sm" readonly placeholder="—">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label text-muted small fw-semibold mb-1">Email</label>
                                        <input type="text" id="tutorEmail" class="form-control form-control-sm" readonly placeholder="—">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label text-muted small fw-semibold mb-1">Dirección registrada</label>
                                        <input type="text" id="tutorDireccion" class="form-control form-control-sm" readonly placeholder="—">
                                    </div>
                                </div>
                            </div>

                            <!-- ============ MASCOTA Y VETERINARIO ============ -->
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Mascota (Paciente) <span class="text-danger">*</span></label>
                                <select name="paciente.id" id="selectMascotaCita" class="form-select" required>
                                    <option value="">-- Primero selecciona un dueño --</option>
                                    <option th:each="p : ${pacientes}"
                                            th:value="${p.id}"
                                            th:text="${p.nombre} + ' (' + ${p.especie != null ? p.especie.nombreEspecie : 'Mascota'} + ')'"
                                            th:attr="data-dueno=${p.dueno != null ? p.dueno.id : ''}"
                                            th:selected="${cita.paciente != null and p.id == cita.paciente.id}"
                                            style="display:none;">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Veterinario Asignado <span class="text-danger">*</span></label>
                                <select th:field="*{veterinario.id}" class="form-select" required>
                                    <option value="">-- Seleccione Veterinario --</option>
                                    <option th:each="v : ${veterinarios}" th:value="${v.id}" th:text="${v.nombreUsuario}"></option>
                                </select>
                            </div>

                            <!-- ============ FECHA Y HORA SEPARADAS ============ -->
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-dark">Fecha <span class="text-danger">*</span></label>
                                <input type="date" id="citaFecha" class="form-control"
                                       th:value="${cita.fechaHora != null ? #temporals.format(cita.fechaHora, 'yyyy-MM-dd') : ''}" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold text-dark">Hora <span class="text-danger">*</span></label>
                                <input type="time" id="citaHora" class="form-control"
                                       th:value="${cita.fechaHora != null ? #temporals.format(cita.fechaHora, 'HH:mm') : ''}" required>
                            </div>
                            <!-- Campo real que recibe el backend: se arma combinando fecha+hora justo antes de enviar -->
                            <input type="hidden" th:field="*{fechaHora}" id="fechaHoraOculta">

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Servicio / Motivo</label>
                                <select th:field="*{servicio.id}" class="form-select">
                                    <option value="">-- Seleccione Servicio (Opcional) --</option>
                                    <option th:each="s : ${servicios}" th:value="${s.id}" th:text="${s.nombreServicio}"></option>
                                </select>
                            </div>

                            <!-- ============ VISITA A DOMICILIO ============ -->
                            <div class="col-12">
                                <div class="form-check form-switch p-3 bg-light rounded-3 border">
                                    <input class="form-check-input" type="checkbox" th:field="*{esVisitaExterna}" id="checkDomicilio" onchange="toggleDomicilio()">
                                    <label class="form-check-label fw-bold text-dark" for="checkDomicilio">
                                        <i class="bi bi-car-front me-1 text-warning"></i> Es una Visita a Domicilio / Campo
                                    </label>
                                </div>
                            </div>
                            <!-- Visible SOLO si es visita a domicilio: dirección + referencia + imagen ilustrativa -->
                            <div id="camposDomicilio" class="col-12 d-none">
                                <div class="row g-3 p-3 border rounded-3 bg-light align-items-center">
                                    <div class="col-md-5">
                                        <label class="form-label fw-bold text-dark">Dirección de la Visita <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{direccionVisita}" id="inputDireccionVisita" class="form-control" placeholder="Av. Principal 123, Distrito">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold text-dark">Referencia de Ubicación</label>
                                        <input type="text" th:field="*{referenciaUbicacion}" class="form-control" placeholder="Cerca al parque, casa azul">
                                    </div>
                                    <div class="col-md-3 text-center">
                                        <!-- Imagen referencial: solo ilustrativa, ayuda visualmente a
                                             confirmar que se trata de una atención fuera del local. -->
                                        <img src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/icons/geo-alt-fill.svg"
                                             alt="Visita a domicilio" style="width:54px;height:54px;opacity:.65;">
                                        <div class="small text-muted mt-1">Atención fuera del local</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Visible cuando NO es domicilio: aviso de que se usa la dirección del local -->
                            <div id="avisoLocal" class="col-12">
                                <div class="alert alert-light border d-flex align-items-center gap-2 mb-0 py-2">
                                    <i class="bi bi-shop text-primary"></i>
                                    <span class="small text-muted">Esta cita se atenderá en el <strong>Local de la Veterinaria</strong>. La dirección se completa automáticamente.</span>
                                </div>
                            </div>

                            <div class="col-12 text-end mt-4">
                                <hr class="my-4">
                                <a th:href="@{/citas}" class="btn btn-light fw-600 px-4 me-2">Cancelar</a>
                                <button type="submit" class="btn btn-primary fw-600 px-4 shadow-sm">
                                    <i class="bi bi-save me-2"></i>
                                    <span th:text="${cita.id != null ? 'Actualizar Cita' : 'Guardar Cita'}"></span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function filtrarMascotasPorDueno() {
        const duenoId = document.getElementById('selectDuenoCita').value;
        const selectMascota = document.getElementById('selectMascotaCita');
        selectMascota.value = '';
        const opts = selectMascota.querySelectorAll('option[data-dueno]');
        opts.forEach(opt => {
            opt.style.display = (duenoId === '' || opt.dataset.dueno === duenoId) ? '' : 'none';
        });
    }

    // Reutiliza el mismo endpoint que ya usa el panel de venta para
    // autocompletar datos de un dueño a partir de su id.
    async function autocompletarTutor() {
        const duenoId = document.getElementById('selectDuenoCita').value;
        const dni = document.getElementById('tutorDni');
        const tel = document.getElementById('tutorTelefono');
        const mail = document.getElementById('tutorEmail');
        const dir = document.getElementById('tutorDireccion');

        if (!duenoId) {
            dni.value = ''; tel.value = ''; mail.value = ''; dir.value = '';
            return;
        }
        try {
            const resp = await fetch(`/api/utilidades/dueno/${duenoId}`);
            const data = await resp.json();
            if (data.success) {
                dni.value = data.dni || '—';
                tel.value = data.telefono || '—';
                mail.value = data.email || '—';
                dir.value = data.direccion || '—';
            }
        } catch (e) {
            console.error('No se pudo cargar la información del tutor:', e);
        }
    }

    function toggleDomicilio(formularioRecienCargado) {
        const esDomicilio = document.getElementById('checkDomicilio').checked;
        const campos = document.getElementById('camposDomicilio');
        const aviso = document.getElementById('avisoLocal');
        const inputDireccion = document.getElementById('inputDireccionVisita');

        if (esDomicilio) {
            campos.classList.remove('d-none');
            aviso.classList.add('d-none');
            inputDireccion.required = true;
            // Al cargar el formulario en modo edición no se debe pisar la
            // dirección ya guardada; solo se limpia cuando el usuario
            // activa el switch manualmente.
            if (!formularioRecienCargado && inputDireccion.value === 'Local de la Veterinaria') {
                inputDireccion.value = '';
            }
        } else {
            campos.classList.add('d-none');
            aviso.classList.remove('d-none');
            inputDireccion.required = false;
            // FIX: si no es visita a domicilio, la dirección se autocompleta
            // sola con "Local de la Veterinaria" (también se fuerza en el
            // backend como respaldo, por si el usuario nunca tocó este campo).
            if (!formularioRecienCargado) {
                inputDireccion.value = 'Local de la Veterinaria';
            }
        }
    }

    // Combina los inputs separados de Fecha y Hora en el campo oculto
    // datetime-local que espera el backend (Cita.fechaHora).
    document.getElementById('formCita').addEventListener('submit', function (e) {
        const fecha = document.getElementById('citaFecha').value;
        const hora = document.getElementById('citaHora').value;
        if (!fecha || !hora) {
            e.preventDefault();
            alert('Selecciona la fecha y la hora de la cita.');
            return;
        }
        document.getElementById('fechaHoraOculta').value = `${fecha}T${hora}`;
    });

    // Estado inicial del formulario: respeta lo que ya viene cargado
    // (modo edición) en vez de forzar siempre "Local de la Veterinaria",
    // y dispara el filtro de mascotas + autocompletado de tutor si ya
    // hay un dueño preseleccionado.
    document.addEventListener('DOMContentLoaded', function () {
        toggleDomicilio(true);

        const selectDueno = document.getElementById('selectDuenoCita');
        if (selectDueno && selectDueno.value) {
            filtrarMascotasPorDueno();
            autocompletarTutor();
        }
    });
</script>
</body>
</html>
