<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | Veterinaria Mejía'">Sistema VetMejía</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --sidebar-width: 260px;
            --header-height: 70px;
            --bg-body: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Contenedor principal desplazado para dejar espacio al Sidebar */
        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* Espacio de trabajo interno */
        .content {
            padding: 2rem;
            flex: 1;
        }

        /* Utilidad global para tarjetas limpias (formularios, tablas, etc) */
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            background-color: #ffffff;
        }
        
        .fw-500 { font-weight: 500; }
        .fw-600 { font-weight: 600; }
    </style>
</head>
<body>
</body>
</html>
