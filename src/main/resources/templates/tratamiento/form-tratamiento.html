<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <head th:replace="~{fragments/head :: head('Nuevo Tratamiento')}"></head>
    
    <body>
    
        <div th:replace="~{fragments/sidebar :: menuLateral}"></div>
    
        <div class="main-content">
            
            <header th:replace="~{fragments/navbar :: topbar}"></header>
    
        <main class="content p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1 fw-bold text-dark"><i class="bi bi-clipboard2-pulse-fill text-primary me-2"></i>Registrar Tratamiento Médico</h2>
                    <p class="text-muted mb-0" th:if="${historia != null}">
                        Registrando tratamiento para la consulta del paciente: <strong th:text="${historia.paciente.nombre}"></strong>
                    </p>
                    <p class="text-muted mb-0" th:unless="${historia != null}">
                        Registro de un tratamiento general o no asociado a una consulta específica.
                    </p>
                </div>
                <a th:href="${historia != null ? '/pacientes/' + historia.paciente.id + '/expediente' : '/pacientes'}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Volver
                </a>
            </div>
    
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show rounded-3 mb-4">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
    
            <div class="card card-custom border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/tratamientos/guardar}" method="post" id="form-tratamiento">
                        <!-- Si venimos de una historia, el ID se pasa. Si no, se buscará por pacienteId. -->
                        <input type="hidden" name="historiaClinicaId" th:if="${historia != null}" th:value="${historia.id}" />

                        <div class="mb-3" th:if="${historia == null}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Dueño / Tutor <span class="text-danger">*</span></label>
                                    <select id="selectDueno" class="form-select" onchange="filtrarMascotasPorDueno()">
                                        <option value="">-- Primero seleccione un dueño --</option>
                                        <option th:each="d : ${duenos}" th:value="${d.id}" th:text="${d.nombre} + ' — DNI: ' + ${d.dni}"
                                                th:selected="${pacienteSeleccionado != null and pacienteSeleccionado.dueno != null and d.id == pacienteSeleccionado.dueno.id}"></option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Mascota (Paciente) <span class="text-danger">*</span></label>
                                    <select name="pacienteId" id="selectMascota" class="form-select" required>
                                        <option value="">-- Esperando selección de dueño --</option>
                                        <option th:each="p : ${pacientes}" th:value="${p.id}"
                                                th:text="${p.nombre} + ' (' + ${p.especie.nombreEspecie} + ')'"
                                                th:attr="data-dueno-id=${p.dueno.id}"
                                                th:selected="${pacienteSeleccionado != null and p.id == pacienteSeleccionado.id}"
                                                style="display: none;"></option>
                                    </select>
                                </div>
                            </div>
                        </div>
    
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Diagnóstico Principal <span class="text-danger">*</span></label>
                            <input type="text" name="diagnostico" class="form-control" th:value="${historia?.diagnostico}" required>
                        </div>
    
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Observaciones / Indicaciones</label>
                            <textarea name="observaciones" class="form-control" rows="3"></textarea>
                        </div>
    
                        <h5 class="fw-bold text-secondary border-top pt-4 mb-3">Medicamentos Aplicados (descuentan stock)</h5>
    
                        <div class="bg-light p-3 rounded border mb-3">
                            <div class="row g-2 align-items-end">
                                <div class="col-md-8">
                                    <label class="form-label small">Buscar Producto Clínico</label>
                                    <select id="select-producto" class="form-select">
                                        <option value="">-- Seleccionar --</option>
                                        <option th:each="p : ${productos}" th:value="${p.id}" th:text="${p.nombre}"></option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <button type="button" class="btn btn-success w-100" onclick="agregarMedicamento()">
                                        <i class="bi bi-plus-circle-fill me-1"></i>Añadir a la lista
                                    </button>
                                </div>
                            </div>
                        </div>
    
                        <div class="table-responsive">
                            <table class="table align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Producto</th>
                                        <th style="width: 15%;">Cantidad</th>
                                        <th style="width: 20%;">Lote</th>
                                        <th style="width: 25%;">Obs.</th>
                                        <th style="width: 5%;"></th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-medicamentos">
                                    <!-- Filas de medicamentos se agregarán aquí -->
                                </tbody>
                            </table>
                        </div>
    
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-primary px-4 py-2">
                                <i class="bi bi-save-fill me-2"></i>Guardar Tratamiento
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function filtrarMascotasPorDueno() {
            const duenoId = document.getElementById('selectDueno').value;
            const selectMascota = document.getElementById('selectMascota');
            selectMascota.value = ''; // Reset selection

            for (const option of selectMascota.options) {
                if (option.value === '') continue; // Skip placeholder
                const mascotaDuenoId = option.getAttribute('data-dueno-id');
                if (duenoId === '' || mascotaDuenoId === duenoId) {
                    option.style.display = 'block';
                } else {
                    option.style.display = 'none';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Si hay un dueño preseleccionado al cargar la página, filtra las mascotas inmediatamente.
            if (document.getElementById('selectDueno').value) {
                filtrarMascotasPorDueno();
            }
        });

        let medIndex = 0;
        function agregarMedicamento() {
            const select = document.getElementById('select-producto');
            const selectedOption = select.options[select.selectedIndex];
            if (!selectedOption.value) return;

            const productoId = selectedOption.value;
            const productoNombre = selectedOption.text;

            const tbody = document.getElementById('tabla-medicamentos');
            const newRow = tbody.insertRow();
            newRow.innerHTML = `
                <td>
                    ${productoNombre}
                    <input type="hidden" name="productoId" value="${productoId}">
                </td>
                <td><input type="number" name="cantidad" class="form-control form-control-sm" step="0.01" min="0.01" required></td>
                <td><input type="text" name="lote" class="form-control form-control-sm"></td>
                <td><input type="text" name="obsDetalle" class="form-control form-control-sm"></td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            `;
            medIndex++;
        }
    </script>
</body>

</html>
