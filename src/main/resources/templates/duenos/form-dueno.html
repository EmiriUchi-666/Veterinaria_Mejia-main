<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Registrar Dueño')}"></head>
<body>
<div th:replace="~{fragments/sidebar :: menuLateral}"></div>
<div class="main-content p-4">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="/duenos" class="btn btn-outline-secondary rounded-circle" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;">
      <i class="bi bi-arrow-left"></i>
    </a>
    <div>
      <h2 class="fw-bold mb-0">
        <i class="bi bi-person-badge me-2 text-primary"></i>
        <span th:text="${dueno.id != null ? 'Editar Dueño' : 'Registrar Nuevo Dueño'}"></span>
      </h2>
      <p class="text-muted mb-0">Complete los datos del responsable de la mascota</p>
    </div>
  </div>

  <div th:if="${errorMsg}" class="alert alert-danger rounded-3 mb-4">
    <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMsg}"></span>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm p-4 p-md-5" style="border-radius:18px;">

        <!-- Solo se ofrece "usar dueño existente" cuando estamos registrando uno nuevo,
             no tiene sentido al editar un dueño puntual. -->
        <div class="mb-4 p-3 bg-light rounded-3 border" th:if="${dueno.id == null}">
          <label class="form-label fw-semibold mb-2">
            <i class="bi bi-search me-1 text-primary"></i>
            ¿Ya existe como dueño? Selecciónalo para autocompletar sus datos
          </label>
          <select id="duenoExistenteSelect" class="form-select">
            <option value="">-- Registrar como nuevo dueño --</option>
            <option th:each="d : ${duenosExistentes}" th:value="${d.id}"
                    th:text="${d.nombre} + (${d.dni != null ? ' — DNI: ' + d.dni : ''}) + (${d.telefono != null ? ' · Tel: ' + d.telefono : ''})">
            </option>
          </select>
          <div class="form-text">
            Al seleccionar un dueño, los campos de nombre, documento y teléfono se bloquean para evitar
            modificarlos por accidente. Si quieres registrar a alguien distinto, vuelve a elegir
            "Registrar como nuevo dueño".
          </div>
        </div>

        <form th:action="@{/duenos/guardar}" th:object="${dueno}" method="POST" id="form-dueno">
          <input type="hidden" th:field="*{id}">
          <!-- Marca si el formulario se está enviando con datos autocompletados desde un dueño existente -->
          <input type="hidden" name="duenoExistenteId" id="duenoExistenteId" value="">

          <div class="row g-3 mb-4">
            <div class="col-12">
              <h6 class="fw-bold text-muted border-bottom pb-2">
                <i class="bi bi-person-circle me-1 text-primary"></i>Datos Personales
              </h6>
            </div>

            <div class="col-md-8">
              <label class="form-label fw-semibold">Nombre Completo <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="campoNombre" th:field="*{nombre}"
                     placeholder="Ej: Juan Carlos Pérez López" required autofocus>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Tipo de Documento</label>
              <select class="form-select" id="campoTipoDocumento" th:field="*{tipoDocumento}">
                <option value="DNI">DNI</option>
                <option value="CE">Carnet de Extranjería</option>
                <option value="Pasaporte">Pasaporte</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Número de Documento <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="campoDni" th:field="*{dni}"
                     placeholder="Ej: 71234567" maxlength="15" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Teléfono / Celular <span class="text-danger">*</span></label>
              <input type="tel" class="form-control" id="campoTelefono" th:field="*{telefono}"
                     placeholder="Ej: 987654321" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Correo Electrónico <span class="text-muted small">(opcional)</span></label>
              <input type="email" class="form-control" id="campoEmail" th:field="*{email}" placeholder="correo@ejemplo.com">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Dirección / Domicilio <span class="text-muted small">(opcional)</span></label>
              <input type="text" class="form-control" id="campoDireccion" th:field="*{direccion}" placeholder="Av. Los Álamos 123, Chiclayo">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Observaciones</label>
              <textarea class="form-control" th:field="*{observaciones}" rows="2"
                        placeholder="Notas adicionales sobre el dueño..."></textarea>
            </div>
          </div>

          <div class="d-flex gap-3 justify-content-end">
            <a href="/duenos" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
            <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold">
              <i class="bi bi-save me-2"></i>
              <span th:text="${dueno.id != null ? 'Actualizar' : 'Registrar Dueño'}"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // =========================================================================
    // AUTOCOMPLETADO DE DUEÑO EXISTENTE (campos readonly hasta que se limpie el select)
    // =========================================================================
    const selectDuenoExistente = document.getElementById('duenoExistenteSelect');

    const campoNombre = document.getElementById('campoNombre');
    const campoTipoDocumento = document.getElementById('campoTipoDocumento');
    const campoDni = document.getElementById('campoDni');
    const campoTelefono = document.getElementById('campoTelefono');
    const campoEmail = document.getElementById('campoEmail');
    const campoDireccion = document.getElementById('campoDireccion');
    const inputDuenoExistenteId = document.getElementById('duenoExistenteId');

    function limpiarCampos() {
        campoNombre.value = '';
        campoTipoDocumento.value = 'DNI';
        campoDni.value = '';
        campoTelefono.value = '';
        campoEmail.value = '';
        campoDireccion.value = '';
        inputDuenoExistenteId.value = '';

        campoNombre.readOnly = false;
        campoDni.readOnly = false;
        campoTelefono.readOnly = false;
        campoTipoDocumento.disabled = false;
        campoNombre.classList.remove('bg-light');
        campoDni.classList.remove('bg-light');
        campoTelefono.classList.remove('bg-light');
        campoTipoDocumento.classList.remove('bg-light');
    }

    if (selectDuenoExistente) {
        selectDuenoExistente.addEventListener('change', async function () {
            const id = this.value;

            if (!id) {
                // El usuario volvió a "Registrar como nuevo dueño": se libera la edición.
                limpiarCampos();
                return;
            }

            try {
                const response = await fetch(`/api/utilidades/dueno/${id}`);
                const data = await response.json();

                if (!data.success) {
                    alert('No se pudo cargar la información de ese dueño.');
                    limpiarCampos();
                    selectDuenoExistente.value = '';
                    return;
                }

                campoNombre.value = data.nombre || '';
                campoDni.value = data.dni || '';
                campoTelefono.value = data.telefono || '';
                campoEmail.value = data.email || '';
                campoDireccion.value = data.direccion || '';
                inputDuenoExistenteId.value = id;

                // Solo se bloquean nombre, documento y teléfono: el usuario podría
                // querer actualizar email/dirección sin riesgo de duplicar el registro.
                campoNombre.readOnly = true;
                campoDni.readOnly = true;
                campoTelefono.readOnly = true;
                campoTipoDocumento.disabled = true;
                campoNombre.classList.add('bg-light');
                campoDni.classList.add('bg-light');
                campoTelefono.classList.add('bg-light');
                campoTipoDocumento.classList.add('bg-light');

            } catch (error) {
                console.error('Error al autocompletar dueño:', error);
                alert('Ocurrió un error al cargar los datos del dueño seleccionado.');
                limpiarCampos();
                selectDuenoExistente.value = '';
            }
        });
    }
</script>
</body>
</html>
