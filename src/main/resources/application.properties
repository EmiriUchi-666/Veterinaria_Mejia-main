# ========================================================

# 1. CONFIGURACIÓN DE CONEXIÓN A MYSQL (CON VARIABLES DE ENTORNO)
# ========================================================
# Si quieres probar en tu PC local:
spring.datasource.url=jdbc:mysql://localhost:3306/veterinaria_mejia_final
spring.datasource.username=root
spring.datasource.password=


# ========================================================
# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# ========================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================================

# Resto de tus configuraciones...
# ========================================================
spring.thymeleaf.cache=false
server.servlet.session.timeout=30m

# ========================================================
# 4. CONFIGURACIÓN DE SUBIDA DE ARCHIVOS (FOTOS)
# ========================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================================================
# 5. RUTA DE ALMACENAMIENTO DE FOTOS DE PACIENTES
# ========================================================
# Ruta absoluta fuera del proyecto (más seguro y profesional)
# Se creará automáticamente en tu carpeta de usuario
app.upload.pacientes-dir=${user.home}/vetmejia-uploads/pacientes/

# ========================================================
# 6. MAPEO DE RECURSOS ESTÁTICOS (para servir las fotos)
# ========================================================
# Permite que Spring Boot sirva archivos desde la carpeta externa
spring.web.resources.static-locations=file:${user.home}/vetmejia-uploads/,classpath:/static/

# ========================================================
# 7. FACTURACIÓN ELECTRÓNICA — NUBEFACT (PSE)
# ========================================================
# Documentación API: https://nubefact.com/api-rest/
# Crear cuenta en: https://app.nubefact.com/register
#
# MODO DEMO (prueba sin envío a SUNAT):
nubefact.modo.prueba=true
#
# TOKEN de la empresa (obtener en Nubefact > Configuración > API):
nubefact.api.token=DEMO
#
# URL base de la API Nubefact:
nubefact.api.url=https://api.nubefact.com/api/v1
#
# Datos de la empresa emisora (llenar con los datos reales de la Vet.):
nubefact.ruc=20600000001
nubefact.razon.social=VETERINARIA MEJIA E.I.R.L.

server.forward-headers-strategy=framework
# PARA PRODUCCION: cambiar modo.prueba=false y ingresar token real

# ── SCHEDULING (contingencia SUNAT C5) ─────────────────────────────────────
spring.task.scheduling.pool.size=2

# ── SPRINGDOC OPENAPI (M3) ──────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ── CACHE Caffeine (M4) ─────────────────────────────────────────────────────
spring.cache.type=caffeine

# ── VALIDACIÓN RUC / SUNAT (A1) ─────────────────────────────────────────────
sunat.api.dni.url=https://api.apis.net.pe/v2/reniec/dni
sunat.api.ruc.url=https://api.apis.net.pe/v2/sunat/ruc

# ── PRODUCCIÓN — activar logging estructurado ────────────────────────────────
# spring.profiles.active=prod

